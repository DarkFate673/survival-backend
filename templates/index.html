<!DOCTYPE html>
<html>
<head>
    <title>Survival System</title>
</head>
<body style="font-family: Arial; padding: 20px;">

<h2>Survival System</h2>

<label>People:</label><br>
<input id="people" type="number" value="1"><br><br>

<label>Water (Litres):</label><br>
<input id="water" type="number" value="10"><br><br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script>
async function calculate() {
    const data = {
        people: Number(document.getElementById("people").value),
        water: Number(document.getElementById("water").value)
    };

    const res = await fetch("/calculate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerText =
        "Days survivable: " + result.days;
}
</script>

</body>
</html>
