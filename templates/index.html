<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survival System</title>

<style>
body {
    background:#0b1020;
    color:white;
    font-family:Arial;
    padding:20px;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button {
    padding:12px;
    width:100%;
    background:#5b8cff;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Survival System</h2>

<label>People</label>
<input id="people" type="number" value="1">

<label>Target Days</label>
<input id="target_days" type="number" value="7">

<label>Water (L)</label>
<input id="water" type="number" value="10">

<label>Food (Calories)</label>
<input id="food" type="number" value="2000">

<label>Petrol (L)</label>
<input id="petrol" type="number" value="0">

<label>Diesel (L)</label>
<input id="diesel" type="number" value="0">

<label>Medical (Days)</label>
<input id="medical" type="number" value="5">

<label>Activity</label>
<select id="activity">
<option value="low">Low</option>
<option value="medium" selected>Medium</option>
<option value="high">High</option>
</select>

<label>Climate</label>
<select id="climate">
<option value="mild">Mild</option>
<option value="hot">Hot</option>
<option value="cold">Cold</option>
</select>

<label>Cooking</label>
<select id="cooking">
<option value="true">Yes</option>
<option value="false">No</option>
</select>

<br><br>

<button onclick="run()">Run Analysis</button>

<h3 id="summary"></h3>

<h3>Coverage</h3>
<div id="coverage"></div>

<h3>Simulation</h3>
<div id="simulation"></div>

<h3>Recommendations</h3>
<div id="recs"></div>

<script>

function payload() {
    return {
        people: +people.value,
        target_days: +target_days.value,
        water: +water.value,
        food: +food.value,
        petrol: +petrol.value,
        diesel: +diesel.value,
        medical: +medical.value,
        activity: activity.value,
        climate: climate.value,
        cooking: cooking.value === "true"
    };
}

async function run() {

    const res = await fetch("/calculate", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload())
    });

    const data = await res.json();

    // SUMMARY
    summary.innerText =
        `Days: ${data.survivable_days}
Weakest: ${data.weakest}
Status: ${data.status}`;

    // COVERAGE
    coverage.innerHTML = `
Water: ${data.coverage.water} days<br>
Food: ${data.coverage.food} days<br>
Fuel: ${data.coverage.fuel} days<br>
Medical: ${data.coverage.medical} days<br>
`;

    // SIMULATION
    simulation.innerHTML = data.simulation.timeline.map(d => `
        Day ${d.day} →
        Water: ${d.water}L |
        Food: ${d.food} |
        Petrol: ${d.petrol}L |
        Diesel: ${d.diesel}L |
        Medical: ${d.medical}
    `).join("<br>");

    // RECOMMENDATIONS
    recs.innerHTML = data.recommendations.join("<br>");
}

</script>

</body>
</html>
