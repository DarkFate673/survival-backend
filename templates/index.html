<h2>Survival System</h2>

<label>People:</label><br>
<input id="people" type="number" value="1"><br><br>

<label>Water (Litres):</label><br>
<input id="water" type="number" value="10"><br><br>

<label>Food (Calories):</label><br>
<input id="food" type="number" value="2000"><br><br>

<label>Fuel (grams):</label><br>
<input id="fuel" type="number" value="100"><br><br>

<label>Medical Coverage (days):</label><br>
<input id="medical" type="number" value="3"><br><br>

<button onclick="calculate()">Run Survival Analysis</button>

<h3 id="output"></h3>

<script>
async function calculate() {
    const data = {
        people: Number(document.getElementById("people").value),
        water: Number(document.getElementById("water").value),
        food: Number(document.getElementById("food").value),
        fuel: Number(document.getElementById("fuel").value),
        medical: Number(document.getElementById("medical").value)
    };

    const res = await fetch("/calculate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("output").innerText =
        "Days: " + result.survivable_days +
        " | Weakest: " + result.weakest +
        " | Status: " + result.status;
}
</script>
